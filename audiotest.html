<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>音频自检</title>
<style>
  body{margin:0;padding:16px;font-family:-apple-system,sans-serif;background:#111;color:#eee;font-size:16px;line-height:1.7}
  h2{font-size:18px;margin:12px 0 6px}
  button{display:block;width:100%;padding:16px;margin:10px 0;font-size:18px;border:none;border-radius:10px;background:#2b7;color:#fff;font-weight:bold}
  button:active{background:#195}
  #log{background:#000;border:1px solid #333;border-radius:8px;padding:10px;margin-top:12px;white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:120px}
  .ok{color:#4d8}.err{color:#f66}.warn{color:#fd6}
</style>
</head>
<body>
<h2>🔊 音频自检</h2>
<p>依次点下面 4 个按钮，把每个按钮下面显示的结果告诉小龙虾。<b>戴耳机或开外放，音量调大。</b></p>

<button id="b1">① 测最简单的"哔"声（纯振荡器）</button>
<button id="b2">② 测滤波器"哔"声（BiquadFilter）</button>
<button id="b3">③ 测压缩器"哔"声（DynamicsCompressor）</button>
<button id="b4">④ 测加法合成人声"啊~"</button>

<div id="log">点按钮后这里显示结果…</div>

<script>
var logEl=document.getElementById('log');
function log(msg,cls){ logEl.innerHTML += '\n'+(cls?'<span class="'+cls+'">'+msg+'</span>':msg); }
function clr(){ logEl.innerHTML=''; }
var actx=null;
function getCtx(){
  if(!actx){ var C=window.AudioContext||window.webkitAudioContext; if(!C){ log('❌ 这个浏览器完全不支持 WebAudio！','err'); return null; } actx=new C(); }
  if(actx.state!=='running'){ try{ actx.resume(); }catch(e){} }
  return actx;
}

// ① 纯振荡器
document.getElementById('b1').onclick=function(){
  clr(); log('① 纯振荡器测试…');
  try{
    var ctx=getCtx(); if(!ctx)return;
    log('AudioContext.state = '+ctx.state, ctx.state==='running'?'ok':'warn');
    log('sampleRate = '+ctx.sampleRate);
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=440; g.gain.value=0.3;
    o.connect(g).connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.6);
    log('✅ 已播放 440Hz 哔声 0.6秒。听到了吗？', 'ok');
    setTimeout(function(){ log('（当前 state='+ctx.state+'）', ctx.state==='running'?'ok':'err'); },700);
  }catch(e){ log('❌ 报错: '+e.message, 'err'); }
};

// ② BiquadFilter
document.getElementById('b2').onclick=function(){
  clr(); log('② 滤波器(BiquadFilter)测试…');
  try{
    var ctx=getCtx(); if(!ctx)return;
    var o=ctx.createOscillator(), bp=ctx.createBiquadFilter(), g=ctx.createGain();
    o.type='sawtooth'; o.frequency.value=300;
    bp.type='bandpass'; bp.frequency.value=800; bp.Q.value=6;
    g.gain.value=0.4;
    o.connect(bp).connect(g).connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.6);
    log('✅ 已播放 经滤波器 的哔声。听到了吗？', 'ok');
    log('（若①有声②没声 → 你浏览器的 BiquadFilter 坏了）','warn');
  }catch(e){ log('❌ 报错: '+e.message, 'err'); }
};

// ③ DynamicsCompressor
document.getElementById('b3').onclick=function(){
  clr(); log('③ 压缩器(DynamicsCompressor)测试…');
  try{
    var ctx=getCtx(); if(!ctx)return;
    var o=ctx.createOscillator(), comp=ctx.createDynamicsCompressor(), g=ctx.createGain();
    o.frequency.value=440; g.gain.value=0.5;
    comp.threshold.value=-18; comp.ratio.value=3;
    o.connect(g).connect(comp).connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.6);
    log('✅ 已播放 经压缩器 的哔声。听到了吗？', 'ok');
    log('（若①有声③没声 → 你浏览器的 DynamicsCompressor 坏了）','warn');
  }catch(e){ log('❌ 报错: '+e.message, 'err'); }
};

// ④ 加法合成人声
document.getElementById('b4').onclick=function(){
  clr(); log('④ 加法合成人声"啊~"测试…');
  try{
    var ctx=getCtx(); if(!ctx)return;
    var t=ctx.currentTime+0.05, dur=1.0, freq=330;
    var F=[730,1090,2440]; // 元音 a 的共振峰
    var env=ctx.createGain();
    env.gain.setValueAtTime(0.0001,t); env.gain.linearRampToValueAtTime(0.8,t+0.05);
    env.gain.setValueAtTime(0.8,t+dur*0.6); env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    env.connect(ctx.destination);
    var cnt=0;
    for(var n=1;n<=12;n++){
      var hz=freq*n; if(hz>4000)break;
      var w=0.06; for(var i=0;i<3;i++){ var bw=[110,130,170][i], a=[1,0.65,0.4][i]; w=Math.max(w, a*Math.exp(-Math.pow((hz-F[i])/bw,2))); }
      if(w<0.05)continue;
      var o=ctx.createOscillator(); o.type='sine'; o.frequency.value=hz;
      var g=ctx.createGain(); g.gain.value=w*(n===1?1:0.85)*0.4;
      o.connect(g).connect(env); o.start(t); o.stop(t+dur+0.05); cnt++;
    }
    log('✅ 已播放 加法合成"啊~"（用了 '+cnt+' 个振荡器）。听到人声了吗？', 'ok');
    log('（这就是神曲主唱的合成方式，若这个没声=问题在这里）','warn');
  }catch(e){ log('❌ 报错: '+e.message, 'err'); }
};
</script>
</body>
</html>
