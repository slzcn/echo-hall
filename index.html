<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>回声厅 · Echo Hall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  :root{
    --bg:#07080d; --bg2:#0d0f1a; --panel:rgba(18,21,36,.72); --panel-solid:#121524;
    --line:rgba(120,140,220,.16); --line2:rgba(120,140,220,.28);
    --ink:#EAF0FF; --sub:#98A3C7; --dim:#5B6688;
    --cyan:#28E6D8; --magenta:#FF3CAC; --violet:#8B5CFF; --amber:#FFB84D;
    --grid:rgba(80,120,255,.05);
    --glow-cyan:0 0 24px rgba(40,230,216,.5); --glow-mag:0 0 24px rgba(255,60,172,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;
    position:relative;
  }
  /* ==== 背景：网格 + 呼吸辉光 ==== */
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 55%,transparent 100%)}
  .bg-orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.4;z-index:0;pointer-events:none;animation:float 14s ease-in-out infinite}
  .orb1{width:420px;height:420px;background:radial-gradient(circle,var(--violet),transparent 70%);top:-120px;left:-80px}
  .orb2{width:380px;height:380px;background:radial-gradient(circle,var(--cyan),transparent 70%);bottom:-120px;right:-60px;animation-delay:-5s}
  .orb3{width:300px;height:300px;background:radial-gradient(circle,var(--magenta),transparent 70%);top:40%;left:55%;animation-delay:-9s;opacity:.25}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,20px) scale(.95)}}

  .stage{position:relative;z-index:2;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
    padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}
  .scene{display:none;width:100%;height:100%}
  .scene.on{display:flex}

  /* 通用玻璃面板 */
  .glass{background:var(--panel);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid var(--line);border-radius:18px}

  /* ============ 场景1：入场 ============ */
  #enter{align-items:center;justify-content:center;flex-direction:column}
  .enter-card{width:min(440px,92vw);padding:38px 34px;text-align:center;position:relative;overflow:hidden}
  .enter-card::before{content:"";position:absolute;inset:0;border-radius:18px;padding:1px;
    background:linear-gradient(135deg,var(--cyan),var(--magenta),var(--violet));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;pointer-events:none}
  .logo-wrap{margin-bottom:6px}
  .logo{font-size:13px;letter-spacing:8px;color:var(--cyan);text-transform:uppercase;font-weight:600}
  .title{font-size:38px;font-weight:800;letter-spacing:2px;margin:8px 0 4px;
    background:linear-gradient(120deg,#fff,var(--cyan) 40%,var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(40,230,216,.2)}
  .sub-line{font-size:12.5px;color:var(--sub);min-height:18px;margin-bottom:26px}
  .cursor{display:inline-block;width:8px;background:var(--cyan);animation:blink 1s steps(1) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}

  .identity{display:flex;align-items:center;gap:16px;padding:16px;border-radius:14px;
    background:rgba(10,12,24,.6);border:1px solid var(--line);margin-bottom:20px;text-align:left}
  .id-av{width:56px;height:56px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;font-size:26px;position:relative;
    transition:.4s cubic-bezier(.2,.9,.3,1.3)}
  .id-info{flex:1;min-width:0}
  .id-name{font-size:19px;font-weight:700;letter-spacing:.5px}
  .id-tag{font-size:11.5px;color:var(--dim);margin-top:3px}
  .reroll{background:none;border:1px solid var(--line2);color:var(--sub);border-radius:9px;padding:8px 10px;cursor:pointer;
    font-family:inherit;font-size:12px;transition:.15s;white-space:nowrap}
  .reroll:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan)}
  .reroll:active{transform:scale(.94)}

  .btn-primary{width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;
    letter-spacing:2px;cursor:pointer;color:#04060c;position:relative;overflow:hidden;
    background:linear-gradient(120deg,var(--cyan),var(--magenta));transition:.2s;box-shadow:0 8px 30px rgba(40,230,216,.25)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,60,172,.35)}
  .btn-primary:active{transform:translateY(0) scale(.99)}
  .btn-primary:disabled{opacity:.5;cursor:wait}

  /* ============ 场景2：大厅 ============ */
  #lobby{flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px}
  .lobby-head{text-align:center}
  .lobby-head h2{font-size:24px;font-weight:800;letter-spacing:1px}
  .lobby-head p{font-size:12.5px;color:var(--sub);margin-top:6px}
  .lobby-head .you{color:var(--cyan)}
  .channels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;width:min(760px,94vw)}
  .ch{padding:22px 20px;border-radius:16px;cursor:pointer;position:relative;overflow:hidden;transition:.22s;
    border:1px solid var(--line);background:var(--panel)}
  .ch:hover{transform:translateY(-4px);border-color:var(--ch-c);box-shadow:0 14px 40px rgba(0,0,0,.4)}
  .ch::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ch-c);opacity:.8}
  .ch .icon{font-size:30px;margin-bottom:12px}
  .ch h3{font-size:17px;font-weight:700;letter-spacing:.5px}
  .ch .desc{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.5}
  .ch .live{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:12px;color:var(--ch-c)}
  .ch .live .pulse{width:7px;height:7px;border-radius:50%;background:var(--ch-c);box-shadow:0 0 8px var(--ch-c);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

  /* ============ 场景3：聊天厅 ============ */
  #hall{flex-direction:column;width:min(900px,96vw);height:min(92vh,900px);height:min(92dvh,900px);margin:auto;overflow:hidden;padding:0}
  .hall-top{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
  .back{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;cursor:pointer;color:var(--sub);
    border:1px solid var(--line);transition:.15s;flex-shrink:0}
  .back:hover{color:var(--cyan);border-color:var(--cyan)}
  .hall-ti{flex:1;min-width:0}
  .hall-ti h3{font-size:16px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  .hall-ti .cnt{font-size:11.5px;color:var(--dim);margin-top:2px}
  .conn{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);white-space:nowrap}
  .conn .led{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:.3s}
  .conn.live .led{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .conn.live{color:var(--cyan)}

  /* 在线光墙 */
  .presence{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;border-bottom:1px solid var(--line);flex-shrink:0;min-height:60px}
  .presence::-webkit-scrollbar{height:0}
  .pav{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;font-size:18px;position:relative;
    animation:popin .4s cubic-bezier(.2,.9,.3,1.4);transition:.3s}
  .pav .ring{position:absolute;inset:-3px;border-radius:13px;border:1.5px solid currentColor;opacity:.5}
  .pav.me::after{content:"你";position:absolute;bottom:-14px;left:0;right:0;text-align:center;font-size:9px;color:var(--cyan)}
  @keyframes popin{from{transform:scale(0) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

  .stream{flex:1;overflow-y:auto;padding:18px 20px 8px;display:flex;flex-direction:column;gap:2px}
  .stream::-webkit-scrollbar{width:6px}
  .stream::-webkit-scrollbar-thumb{background:rgba(120,140,220,.25);border-radius:3px}

  .msg{display:flex;gap:11px;padding:5px 0;align-items:flex-start;animation:slidein .32s cubic-bezier(.2,.8,.3,1)}
  @keyframes slidein{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .msg .av{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-size:16px;margin-top:2px}
  .msg .body{flex:1;min-width:0}
  .msg .meta{display:flex;align-items:baseline;gap:8px}
  .msg .nm{font-size:13px;font-weight:700}
  .msg .tm{font-size:10px;color:var(--dim)}
  .msg .txt{font-size:14.5px;line-height:1.6;margin-top:3px;color:var(--ink);word-break:break-word;
    background:rgba(255,255,255,.03);padding:8px 12px;border-radius:4px 12px 12px 12px;display:inline-block;border:1px solid var(--line);position:relative}
  .msg.me{flex-direction:row-reverse}
  .msg.me .meta{flex-direction:row-reverse}
  .msg.me .body{display:flex;flex-direction:column;align-items:flex-end}
  .msg.me .txt{border-radius:12px 4px 12px 12px;background:linear-gradient(120deg,rgba(40,230,216,.14),rgba(139,92,255,.14));border-color:var(--line2)}
  /* 回声（点赞）*/
  .msg .echo{position:absolute;right:-8px;bottom:-10px;background:var(--panel-solid);border:1px solid var(--line2);
    border-radius:10px;padding:1px 7px;font-size:11px;cursor:pointer;user-select:none;transition:.15s;color:var(--sub);opacity:0}
  .msg:hover .echo,.msg .echo.has{opacity:1}
  .msg .echo:hover{border-color:var(--magenta);color:var(--magenta)}
  .msg .echo.has{color:var(--magenta);border-color:rgba(255,60,172,.4)}
  /* 动作消息 /me */
  .actmsg{text-align:center;font-size:12.5px;color:var(--violet);font-style:italic;padding:6px;animation:slidein .3s}
  /* 系统消息 */
  .sysmsg{text-align:center;font-size:11.5px;color:var(--dim);padding:5px}
  .sysmsg b{color:var(--sub)}

  /* 正在输入 */
  .typing-bar{height:20px;padding:0 20px;font-size:11.5px;color:var(--cyan);flex-shrink:0;display:flex;align-items:center;gap:6px;opacity:0;transition:.2s}
  .typing-bar.on{opacity:1}
  .typing-bar .d{display:inline-flex;gap:3px}
  .typing-bar .d i{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:bounce 1.2s infinite}
  .typing-bar .d i:nth-child(2){animation-delay:.15s}.typing-bar .d i:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}

  /* 输入区 */
  .composer{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);flex-shrink:0;align-items:flex-end}
  .cin-wrap{flex:1;display:flex;align-items:center;background:rgba(10,12,24,.6);border:1px solid var(--line);border-radius:12px;padding:2px 6px 2px 14px;transition:.2s}
  .cin-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(40,230,216,.1)}
  /* font-size 必须 ≥16px，否则 iOS Safari 聚焦输入框会自动放大整页 */
  .cin{flex:1;border:none;outline:none;background:none;color:var(--ink);font-family:inherit;font-size:16px;resize:none;
    line-height:1.5;max-height:100px;min-height:24px;padding:10px 0}
  .cin::placeholder{color:var(--dim)}
  .emoji-btn{font-size:20px;cursor:pointer;padding:6px;border-radius:8px;transition:.15s;user-select:none}
  .emoji-btn:hover{background:rgba(255,255,255,.06);transform:scale(1.15)}
  .go{width:46px;height:46px;border:none;border-radius:12px;cursor:pointer;flex-shrink:0;display:grid;place-items:center;
    background:linear-gradient(120deg,var(--cyan),var(--magenta));transition:.2s;box-shadow:0 6px 20px rgba(40,230,216,.25)}
  .go svg{width:20px;height:20px;color:#04060c}
  .go:hover{transform:translateY(-2px) scale(1.05)}.go:active{transform:scale(.95)}
  .go:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}

  .emoji-tray{position:absolute;bottom:72px;right:70px;background:var(--panel-solid);border:1px solid var(--line2);border-radius:14px;
    padding:10px;display:none;grid-template-columns:repeat(7,1fr);gap:3px;z-index:30;box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .emoji-tray.on{display:grid}
  .emoji-tray b{font-size:22px;cursor:pointer;padding:5px;border-radius:8px;text-align:center;transition:.12s;font-weight:400}
  .emoji-tray b:hover{background:rgba(255,255,255,.08);transform:scale(1.2)}

  /* 粒子层 */
  #particles{position:fixed;inset:0;z-index:40;pointer-events:none;overflow:hidden}
  .particle{position:absolute;font-size:26px;animation:rise 3.4s ease-out forwards;will-change:transform,opacity}
  @keyframes rise{0%{transform:translateY(0) scale(.5) rotate(0);opacity:0}
    12%{opacity:1;transform:translateY(-40px) scale(1.1)}
    100%{transform:translateY(-90vh) scale(.9) rotate(var(--spin));opacity:0}}

  /* toast */
  #toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:60;
    background:var(--panel-solid);border:1px solid var(--line2);border-radius:12px;padding:11px 20px;font-size:13px;
    transition:.4s cubic-bezier(.2,.9,.3,1.3);box-shadow:0 12px 40px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap}
  #toast.on{transform:translateX(-50%) translateY(0)}

  /* ============ 私密房区（大厅内）============ */
  .priv-sec{width:min(760px,94vw);margin-top:6px}
  .priv-divider{display:flex;align-items:center;text-align:center;color:var(--dim);font-size:11.5px;margin:8px 0 16px}
  .priv-divider::before,.priv-divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .priv-divider span{padding:0 14px;white-space:nowrap}
  .priv-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .priv-btn{padding:12px 22px;border-radius:12px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;
    background:rgba(10,12,24,.5);border:1px solid var(--line2);color:var(--ink);transition:.18s;letter-spacing:.5px}
  .priv-btn:hover{transform:translateY(-2px)}
  .priv-btn.create:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan)}
  .priv-btn.join:hover{border-color:var(--magenta);color:var(--magenta);box-shadow:var(--glow-mag)}
  .my-rooms{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .rm{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);transition:.18s}
  .rm:hover{border-color:var(--violet);transform:translateX(3px)}
  .rm .rm-ic{font-size:22px}
  .rm .rm-nm{flex:1;font-weight:700;font-size:14px}
  .rm .rm-code{font-size:11px;color:var(--dim);letter-spacing:1px}
  .rm .rm-arr{color:var(--dim)}

  /* ============ 弹窗 ============ */
  .modal-mask{position:fixed;inset:0;z-index:80;background:rgba(4,6,12,.7);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .modal-mask.on{display:flex}
  .modal{width:min(400px,92vw);max-height:90dvh;overflow-y:auto;padding:30px 28px;position:relative;animation:popin .3s cubic-bezier(.2,.9,.3,1.3)}
  .modal-x{position:absolute;top:16px;right:18px;color:var(--dim);cursor:pointer;font-size:16px;transition:.15s}
  .modal-x:hover{color:var(--magenta)}
  .modal h3{font-size:21px;font-weight:800;margin-bottom:8px;letter-spacing:.5px}
  .modal-sub{font-size:12.5px;color:var(--sub);line-height:1.6;margin-bottom:22px}
  .fld{display:block;margin-bottom:18px}
  .fld span{display:block;font-size:12px;color:var(--dim);margin-bottom:7px;letter-spacing:.5px}
  .fld input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--line2);background:rgba(10,12,24,.6);
    color:var(--ink);font-family:inherit;font-size:16px;outline:none;transition:.18s}
  .fld input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(40,230,216,.1)}
  .emoji-pick{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
  .emoji-pick b{font-size:20px;padding:6px;border-radius:8px;text-align:center;cursor:pointer;font-weight:400;transition:.12s;border:1px solid transparent}
  .emoji-pick b:hover{background:rgba(255,255,255,.06)}
  .emoji-pick b.on{border-color:var(--cyan);background:rgba(40,230,216,.12)}
  .code-box{display:flex;align-items:center;gap:10px;padding:16px 18px;border-radius:12px;margin-bottom:22px;
    background:rgba(40,230,216,.08);border:1px solid rgba(40,230,216,.3)}
  .code-box #codeVal{flex:1;font-size:26px;font-weight:800;letter-spacing:5px;color:var(--cyan);text-align:center}
  .code-copy{padding:8px 14px;border-radius:9px;border:1px solid var(--line2);background:none;color:var(--sub);
    font-family:inherit;font-size:12px;cursor:pointer;transition:.15s}
  .code-copy:hover{border-color:var(--cyan);color:var(--cyan)}
  .modal-err{color:var(--magenta);font-size:12.5px;min-height:18px;margin-bottom:12px}

  @media(max-width:600px){
    .title{font-size:30px}
    /* 手机端聊天厅铺满：stage 去 padding 让 hall 真正贴边，hall 用 dvh 避开地址栏遮挡 */
    .stage:has(#hall.on){padding:0}
    #hall{width:100%;height:100vh;height:100dvh;border-radius:0;border:none}
    /* 顶栏/输入区吃安全区，避免刘海和底部横条遮挡 */
    .hall-top{padding-top:calc(14px + env(safe-area-inset-top))}
    .composer{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
    .channels{grid-template-columns:1fr}
    .priv-actions{flex-direction:column}
    .priv-btn{width:100%}
    .emoji-tray{right:14px;left:14px;grid-template-columns:repeat(8,1fr)}
    .enter-card{padding:32px 22px}
    .modal{padding:26px 20px}
  }
  /* 不支持 :has() 的旧浏览器兜底：手机端 stage 统一收窄 padding */
  @supports not (selector(:has(*))){
    @media(max-width:600px){ .stage{padding:0} }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div><div class="bg-orb orb2"></div><div class="bg-orb orb3"></div>
<div id="particles"></div>
<div id="toast"></div>

<div class="stage">

  <!-- ===== 场景1：入场 ===== -->
  <div class="scene on" id="enter">
    <div class="glass enter-card">
      <div class="logo-wrap"><span class="logo">◢◤ Realtime ◢◤</span></div>
      <div class="title">回声厅</div>
      <div class="sub-line" id="subLine"></div>
      <div class="identity">
        <div class="id-av" id="idAv">🦊</div>
        <div class="id-info">
          <div class="id-name" id="idName">量子水獭</div>
          <div class="id-tag" id="idTag">你的临时身份 · 无需注册</div>
        </div>
        <button class="reroll" id="rerollBtn">↻ 换一个</button>
      </div>
      <button class="btn-primary" id="enterBtn">进 入 回 声 厅</button>
    </div>
  </div>

  <!-- ===== 场景2：大厅 ===== -->
  <div class="scene" id="lobby">
    <div class="lobby-head">
      <h2>选择一个频道</h2>
      <p>以 <span class="you" id="lobbyName">—</span> 的身份 · 数字代表此刻真实在线人数</p>
    </div>
    <div class="channels" id="channels"></div>

    <!-- 私密房区 -->
    <div class="priv-sec">
      <div class="priv-divider"><span>🔒 私密房 · 仅限邀请码进入 · 消息持久保存</span></div>
      <div class="priv-actions">
        <button class="priv-btn create" id="createRoomBtn">＋ 创建私密房</button>

// ---- 频道定义 ----
const CHANNELS = [
  {id:'plaza',  name:'闲聊广场', icon:'🌐', c:'#28E6D8', desc:'什么都能聊，此刻最热闹的地方'},

// ============ 场景切换 ============
function goScene(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));
  $('#'+id).classList.add('on');
}

// ============ MQTT 连接管理 ============
let client = null;
let curCh = null;
let presence = {};       // id -> {name,emoji,color,ts}
let presenceTimer = null;
let heartbeat = null;
let typingUsers = {};     // id -> timeout
let sentTyping = 0;

function topic(ch, kind){ return `${NS}/${ch}/${kind}`; }

function connect(onReady){
  const cid = 'eh_'+me.id+'_'+uid();
  client = mqtt.connect(BROKER, {
    clientId: cid, clean:true, connectTimeout:8000, reconnectPeriod:2000,
    keepalive:30,
  });
  client.on('connect', ()=>{ setConn(true); if(onReady){onReady();onReady=null;} });
  client.on('reconnect', ()=>setConn(false,'重连中'));
  client.on('offline', ()=>setConn(false,'离线'));
  client.on('error', e=>{ console.warn('mqtt error',e); setConn(false,'连接错误'); });
  client.on('message', onMessage);
}
function setConn(live, txt){
  const el=$('#conn');
  el.classList.toggle('live', live);
  $('#connTxt').textContent = live ? '实时在线' : (txt||'连接中');
}

// 进入频道：订阅 msg/typing/presence
function joinChannel(ch){
  curCh = ch;
  presence = {}; typingUsers = {};
  $('#stream').innerHTML='';
  $('#hallName').innerHTML = `${ch.icon} ${esc(ch.name)}`;
  renderPresence();
  goScene('hall');

  const doJoin = ()=>{
    client.subscribe([topic(ch.id,'msg'), topic(ch.id,'typing'), topic(ch.id,'presence')], {qos:0});
    // 宣告自己上线（retain=false，靠心跳维持）
    announce('join');
    startHeartbeat();
    sysMsg(`你以 <b>${esc(me.name)}</b> 的身份进入了「${esc(ch.name)}」`);
  };
  if(client && client.connected) doJoin();
  else connect(doJoin);
}

// presence：定期广播自己在线 + 清理超时的人
function announce(kind){
  if(!client||!client.connected) return;
  client.publish(topic(curCh.id,'presence'), JSON.stringify({
    kind, id:me.id, name:me.name, emoji:me.emoji, color:me.color, ts:Date.now()
  }), {qos:0});
}
function startHeartbeat(){
  clearInterval(heartbeat);
  presence[me.id] = {...me, ts:Date.now(), self:true};
  renderPresence();
  heartbeat = setInterval(()=>{
    announce('ping');
    // 清理 12s 未心跳的人
    const now=Date.now(); let changed=false;
    for(const id in presence){
      if(id!==me.id && now-presence[id].ts>12000){ delete presence[id]; changed=true; }
    }
    if(changed) renderPresence();
  }, 4000);
}
function leaveChannel(){
  if(client && client.connected && curCh){
    announce('leave');
    client.unsubscribe([topic(curCh.id,'msg'), topic(curCh.id,'typing'), topic(curCh.id,'presence')]);
  }
  clearInterval(heartbeat); clearInterval(presenceTimer);
  curCh=null;
}

// ============ 收消息 ============
function onMessage(t, payload){
  let d; try{ d=JSON.parse(payload.toString()); }catch(e){ return; }
  const kind = t.split('/').pop();
  if(kind==='presence') return onPresence(d);
  if(kind==='typing')   return onTyping(d);
  if(kind==='msg')      return onChatMsg(d);
}
function onPresence(d){
  if(d.id===me.id) return;
  if(d.kind==='leave'){
    if(presence[d.id]){ delete presence[d.id]; renderPresence();
      if(d.name) sysMsg(`<b>${esc(d.name)}</b> 离开了`); }
    return;
  }
  const isNew = !presence[d.id];
  presence[d.id] = {id:d.id,name:d.name,emoji:d.emoji,color:d.color,ts:Date.now()};
  if(isNew){
    renderPresence();
    if(d.kind==='join'){
      sysMsg(`<b>${esc(d.name)}</b> 进入了回声厅`);
      announce('ping'); // 让新人立刻看到我
    }
  } else { presence[d.id].ts=Date.now(); }
}
function onTyping(d){
  if(d.id===me.id) return;
  clearTimeout(typingUsers[d.id]);
  typingUsers[d.id] = setTimeout(()=>{ delete typingUsers[d.id]; renderTyping(); }, 2600);
  typingUsers['_name_'+d.id] = d.name;
  renderTyping();
}
function onChatMsg(d){
  // EMQX broker 会把自己发的消息回推给自己；本地发送时已乐观上屏，故跳过自己的回环，避免重复两份。
  if(d.id===me.id) return;
  if(d.type==='echo'){ applyEcho(d.mid, d.id); return; }
  addMsg(d, false);
  if(d.emojiOnly) burst(d.text);
}

// ============ 渲染在线光墙 ============
function renderPresence(){
  const box=$('#presence');
  const list = Object.values(presence).sort((a,b)=> a.self?-1:b.self?1:0);
  box.innerHTML = list.map(p=>`
    <div class="pav ${p.self?'me':''}" style="background:${p.color}22;color:${p.color};box-shadow:inset 0 0 0 1.5px ${p.color}" title="${esc(p.name)}">
      ${p.emoji}<span class="ring"></span>
    </div>`).join('');
  const n = list.length;
  $('#hallCnt').textContent = `${n} 人在线`;
}

// ============ 渲染消息 ============
let msgSeq = 0;
function fmtNow(){ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function addMsg(d, isMe){
  const stream=$('#stream');
  if(d.act){  // /me 动作
    const el=document.createElement('div'); el.className='actmsg';
    el.innerHTML = `✦ <b style="color:${d.color}">${esc(d.name)}</b> ${esc(d.text)}`;
    stream.appendChild(el); scrollStream(); return;
  }
  const el=document.createElement('div');
  el.className='msg'+(isMe?' me':'');
  el.dataset.mid = d.mid;
  el.innerHTML = `
    <div class="av" style="background:${d.color}22;color:${d.color};box-shadow:inset 0 0 0 1.5px ${d.color}">${d.emoji}</div>
    <div class="body">
      <div class="meta"><span class="nm" style="color:${d.color}">${esc(d.name)}</span><span class="tm">${fmtNow()}</span></div>
      <div class="txt">${esc(d.text)}<span class="echo" data-mid="${d.mid}">🔥 <span class="ec">0</span></span></div>
    </div>`;
  stream.appendChild(el);
  el.querySelector('.echo').onclick = ()=>sendEcho(d.mid);
  scrollStream();
}
function sysMsg(html){
  const el=document.createElement('div'); el.className='sysmsg'; el.innerHTML=html;
  $('#stream').appendChild(el); scrollStream();
}
function scrollStream(){ const s=$('#stream'); s.scrollTop=s.scrollHeight; }

// 回声（点赞）
const echoCount = {};
function sendEcho(mid){
  if(mode==='sb'){ applyEcho(mid, sbUid); return; } // 私密房：本地回声（不广播，暂不落库）
  if(!client || !client.connected) return;
  client.publish(topic(curCh.id,'msg'), JSON.stringify({type:'echo', mid, id:me.id}), {qos:0});
  applyEcho(mid, me.id);
}
function applyEcho(mid, who){
  echoCount[mid] = (echoCount[mid]||0)+1;
  const el = document.querySelector(`.msg[data-mid="${mid}"] .echo`);
  if(el){ el.classList.add('has'); el.querySelector('.ec').textContent=echoCount[mid];
    el.style.transform='scale(1.3)'; setTimeout(()=>el.style.transform='',150); }
  if(who!==me.id) burst('🔥',6);
}

// ============ 正在输入 ============
function renderTyping(){
  const names = Object.keys(typingUsers).filter(k=>!k.startsWith('_name_')).map(id=>typingUsers['_name_'+id]).filter(Boolean);
  const bar=$('#typingBar');
  if(names.length){
    $('#typingTxt').textContent = names.length===1 ? `${names[0]} 正在输入` : `${names.length} 人正在输入`;
    bar.classList.add('on');
  } else bar.classList.remove('on');
}

// ============ 发送 ============
function send(){
  if(mode==='sb') return sbSend();
  const inp=$('#cin'); let text=inp.value.trim();
  if(!text || !client || !client.connected) return;
  let act=false;
  if(text.startsWith('/me ')){ act=true; text=text.slice(4); }
  const emojiOnly = /^(\p{Emoji_Presentation}|\p{Emoji}️|\s)+$/u.test(text) && text.length<=12;
  const mid = me.id+'_'+(msgSeq++);
  const payload = {mid, id:me.id, name:me.name, emoji:me.emoji, color:me.color, text, act, emojiOnly};
  client.publish(topic(curCh.id,'msg'), JSON.stringify(payload), {qos:0});
  addMsg(payload, true);
  if(emojiOnly) burst(text);
  inp.value=''; inp.style.height='24px'; $('#goBtn').disabled=true;
}

// 生成 6 位邀请码
function genCode(){
  const CH='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=CH[Math.floor(Math.random()*CH.length)];
  return s;
}

// 建房
async function createRoom(name, emoji){
  sbUid = await sbReady;
  if(!sbUid){ toast('身份初始化失败，刷新重试'); return null; }
  // 邀请码唯一，冲突则重试几次
  for(let tries=0; tries<5; tries++){
    const code = genCode();
    const { data, error } = await sb.from('eh_rooms')
      .insert({ name, emoji, invite_code:code, owner:sbUid })
      .select('id,name,emoji,invite_code').single();
    if(!error && data){
      // 房主自动入成员表
      await sb.from('eh_members').insert({ room_id:data.id, user_id:sbUid, name:me.name, emoji:me.emoji, color:me.color });
      return data;
    }
    if(error && !/duplicate|unique/i.test(error.message||'')){ console.warn('createRoom',error); toast('建房失败'); return null; }
  }
  toast('邀请码冲突，请重试'); return null;
}

// 凭码入房
async function joinRoomByCode(code){
  sbUid = await sbReady;
  if(!sbUid) return {err:'身份初始化失败，刷新重试'};
  // 用 SECURITY DEFINER 函数按码查房（非成员也能查到基本信息）
  const { data:rooms, error } = await sb.rpc('eh_find_room_by_code', { code });
  if(error){ console.warn(error); return {err:'查询失败'}; }
  const room = Array.isArray(rooms)?rooms[0]:rooms;
  if(!room){ return {err:'邀请码无效或房间不存在'}; }
  // 加入成员表（重复加入靠主键冲突忽略）
  const { error:mErr } = await sb.from('eh_members')
    .insert({ room_id:room.id, user_id:sbUid, name:me.name, emoji:me.emoji, color:me.color });
  if(mErr && !/duplicate|unique/i.test(mErr.message||'')){ console.warn(mErr); return {err:'加入失败'}; }
  return { room };
}

// 进入私密房：拉历史 + 订阅 Realtime
async function enterRoom(room){
  curRoom = room; mode='sb';
  stopLobbyProbe(); if(client && client.connected) leaveChannel();
  $('#stream').innerHTML=''; presence={}; typingUsers={};
  $('#hallName').innerHTML = `${room.emoji||'🔒'} ${esc(room.name)} <span style="font-size:11px;color:var(--dim);font-weight:400">· 私密</span>`;
  $('#hallCnt').textContent='加载中…';
  renderPresence();
  goScene('hall');
  setConn(true);

  sbUid = await sbReady;
  // 拉历史消息
  const { data:hist } = await sb.from('eh_messages')
    .select('*').eq('room_id', room.id).order('id',{ascending:true}).limit(500);
  (hist||[]).forEach(m=>{
    addMsg({mid:'db_'+m.id, id:m.user_id, name:m.name, emoji:m.emoji, color:m.color, text:m.text, act:m.kind==='act'}, m.user_id===sbUid);
  });
  // 成员数
  const { count } = await sb.from('eh_members').select('*',{count:'exact',head:true}).eq('room_id', room.id);
  $('#hallCnt').textContent = `${count||1} 名成员`;

  // 订阅新消息
  if(roomChan){ sb.removeChannel(roomChan); roomChan=null; }
  roomChan = sb.channel('room:'+room.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'eh_messages', filter:'room_id=eq.'+room.id },
      payload=>{
        const m=payload.new;
        if(m.user_id===sbUid) return; // 自己发的已本地上屏
        addMsg({mid:'db_'+m.id, id:m.user_id, name:m.name, emoji:m.emoji, color:m.color, text:m.text, act:m.kind==='act'}, false);
        const eo=/^(\p{Emoji_Presentation}|\p{Emoji}️|\s)+$/u.test(m.text)&&m.text.length<=12;
        if(eo) burst(m.text);
      })
    .subscribe();
}

// 私密房发消息
async function sbSend(){
  const inp=$('#cin'); let text=inp.value.trim();
  if(!text || !curRoom) return;
  let act=false;
  if(text.startsWith('/me ')){ act=true; text=text.slice(4); }
  const emojiOnly = /^(\p{Emoji_Presentation}|\p{Emoji}️|\s)+$/u.test(text) && text.length<=12;
  // 本地先上屏（乐观）
  addMsg({mid:'local_'+(msgSeq++), id:sbUid, name:me.name, emoji:me.emoji, color:me.color, text, act}, true);
  if(emojiOnly) burst(text);
  inp.value=''; inp.style.height='24px'; $('#goBtn').disabled=true;
  const { error } = await sb.from('eh_messages').insert({
    room_id:curRoom.id, user_id:sbUid, name:me.name, emoji:me.emoji, color:me.color, text, kind:act?'act':'msg'
  });
  if(error){ console.warn('sbSend',error); toast('发送失败'); }
}

function leaveRoom(){
  if(roomChan){ sb.removeChannel(roomChan); roomChan=null; }
  curRoom=null; mode='mqtt';
}

// ============ emoji 粒子 ============
function burst(str, count=10){
  const chars = [...str].filter(c=>/\p{Emoji}/u.test(c));
  if(!chars.length) chars.push('✨');
  const layer=$('#particles');
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='particle';
    p.textContent = rand(chars);
    p.style.left = (10+Math.random()*80)+'vw';
    p.style.bottom = '60px';
    p.style.setProperty('--spin', (Math.random()*720-360)+'deg');
    p.style.animationDelay = (Math.random()*0.3)+'s';
    p.style.fontSize = (20+Math.random()*20)+'px';
    layer.appendChild(p);
    setTimeout(()=>p.remove(), 3800);
  }
}

// ============ toast ============
let toastT=null;
function toast(msg){
  const t=$('#toast'); t.innerHTML=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2400);
}

// ============ 大厅：频道卡 + 实时在线数 ============
let lobbyClient=null, lobbyCounts={};
function renderChannels(){
  $('#channels').innerHTML = CHANNELS.map(ch=>`
    <div class="ch" data-ch="${ch.id}" style="--ch-c:${ch.c}">
      <div class="icon">${ch.icon}</div>
      <h3>${ch.name}</h3>
      <div class="desc">${ch.desc}</div>
      <div class="live"><span class="pulse"></span><span id="cnt_${ch.id}">— 人在线</span></div>
    </div>`).join('');
  document.querySelectorAll('.ch').forEach(el=>el.onclick=()=>{
    const ch = CHANNELS.find(c=>c.id===el.dataset.ch);
    stopLobbyProbe();
    joinChannel(ch);
  });
}
// 大厅期间：订阅各频道 presence，统计实时人数
function startLobbyProbe(){
  lobbyCounts={};
  const probe = mqtt.connect(BROKER,{clientId:'ehprobe_'+uid(),clean:true,reconnectPeriod:2000,keepalive:30});
  lobbyClient=probe;
  const seen={};
  probe.on('connect',()=>{
    CHANNELS.forEach(ch=>probe.subscribe(topic(ch.id,'presence'),{qos:0}));
    // 主动 ping 一下让各房间的人应答（探测用，不加入）
  });
  probe.on('message',(t,pl)=>{
    let d;try{d=JSON.parse(pl.toString())}catch(e){return;}
    const chId = t.split('/')[t.split('/').length-2];
    seen[chId]=seen[chId]||{};
    if(d.kind==='leave'){ delete seen[chId][d.id]; }
    else seen[chId][d.id]={ts:Date.now()};
    updateLobbyCounts(seen);
  });
  // 定期清理过期
  lobbyCounts._timer = setInterval(()=>{
    const now=Date.now();
    for(const ch in seen){ for(const id in seen[ch]){ if(now-seen[ch][id].ts>12000) delete seen[ch][id]; } }
    updateLobbyCounts(seen);
  },4000);
}
function updateLobbyCounts(seen){
  CHANNELS.forEach(ch=>{
    const n = seen[ch.id]?Object.keys(seen[ch.id]).length:0;
    const el=$('#cnt_'+ch.id); if(el) el.textContent = `${n} 人在线`;
  });
}
function stopLobbyProbe(){
  if(lobbyClient){ try{lobbyClient.end(true)}catch(e){} lobbyClient=null; }
  if(lobbyCounts._timer) clearInterval(lobbyCounts._timer);
}

// ============ 事件绑定 ============
$('#rerollBtn').onclick = ()=>rollIdentity();
$('#enterBtn').onclick = ()=>{
  $('#lobbyName').textContent = me.name;
  $('#lobbyName').style.color = me.color;
  goScene('lobby');
  renderChannels();
  startLobbyProbe();

};

// ============ 私密房弹窗 ============
const ROOM_EMOJIS = ['🔒','🌙','🎧','🍺','☕','🎮','💻','📚','🎨','🔥','🌈','🛸','🐋','🦊','🎭','🕹️'];
let pickedEmoji = '🔒';
function openModal(which){
  $('#modalMask').classList.add('on');
  ['mCreate','mCreated','mJoin'].forEach(id=>$('#'+id).style.display = (id===which?'block':'none'));
  if(which==='mCreate'){
    $('#roomNameIn').value=''; pickedEmoji='🔒';
    $('#roomEmojiPick').innerHTML = ROOM_EMOJIS.map((e,i)=>`<b class="${i===0?'on':''}">${e}</b>`).join('');
    $('#roomEmojiPick').querySelectorAll('b').forEach(b=>b.onclick=()=>{
      pickedEmoji=b.textContent;
      $('#roomEmojiPick').querySelectorAll('b').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    });
    setTimeout(()=>$('#roomNameIn').focus(),50);
  }
  if(which==='mJoin'){ $('#codeIn').value=''; $('#joinErr').textContent=''; setTimeout(()=>$('#codeIn').focus(),50); }
}
function closeModal(){ $('#modalMask').classList.remove('on'); }
$('#modalX').onclick = closeModal;
$('#modalMask').onclick = e=>{ if(e.target===$('#modalMask')) closeModal(); };

$('#createRoomBtn').onclick = ()=>openModal('mCreate');
$('#joinRoomBtn').onclick   = ()=>openModal('mJoin');

let createdRoom = null;
$('#doCreateBtn').onclick = async ()=>{
  const name = $('#roomNameIn').value.trim();
  if(!name){ $('#roomNameIn').focus(); toast('给房间起个名'); return; }
  const btn=$('#doCreateBtn'); btn.disabled=true; btn.textContent='生成中…';
  createdRoom = await createRoom(name, pickedEmoji);
  btn.disabled=false; btn.textContent='生 成 房 间';
  if(createdRoom){
    $('#codeVal').textContent = createdRoom.invite_code;
    openModal('mCreated');
  }
};
$('#codeCopy').onclick = ()=>{
  const code=$('#codeVal').textContent;
  navigator.clipboard?.writeText(code).then(()=>toast('邀请码已复制'),()=>toast('复制失败，请手动记下'));
};
$('#enterCreatedBtn').onclick = ()=>{ closeModal(); if(createdRoom) enterRoom(createdRoom); };

$('#doJoinBtn').onclick = async ()=>{
  const code = $('#codeIn').value.trim().toUpperCase();
  if(!code){ $('#codeIn').focus(); return; }
  const btn=$('#doJoinBtn'); btn.disabled=true; btn.textContent='进入中…';
  $('#joinErr').textContent='';
  const res = await joinRoomByCode(code);
  btn.disabled=false; btn.textContent='进 入 房 间';
  if(res.err){ $('#joinErr').textContent=res.err; return; }
  closeModal(); enterRoom(res.room);
};
$('#codeIn') && $('#codeIn').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();$('#doJoinBtn').click();} });
$('#backBtn').onclick = ()=>{
  if(mode==='sb') leaveRoom();
  else leaveChannel();
  goScene('lobby');
  renderChannels();
  startLobbyProbe();
  loadMyRooms();
};

// 输入框
const cin=$('#cin');
cin.addEventListener('input',()=>{
  cin.style.height='24px'; cin.style.height=Math.min(cin.scrollHeight,100)+'px';
  $('#goBtn').disabled = !cin.value.trim();
  // 广播 typing（节流 1.2s）——仅公共频道(MQTT)。私密房暂不做输入态。
  const now=Date.now();
  if(mode==='mqtt' && cin.value.trim() && now-sentTyping>1200 && client && client.connected && curCh){
    sentTyping=now;
    client.publish(topic(curCh.id,'typing'), JSON.stringify({id:me.id,name:me.name}), {qos:0});
  }
});
cin.addEventListener('keydown',e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
$('#goBtn').onclick = send;
