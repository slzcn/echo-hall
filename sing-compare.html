<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>C vs TTS 唱法对比</title>
<style>
  body{margin:0;padding:16px;font-family:-apple-system,sans-serif;background:#0f1216;color:#eee;font-size:16px;line-height:1.7}
  h2{font-size:19px;margin:14px 0 6px}
  .box{background:#171c22;border:1px solid #2a3440;border-radius:12px;padding:14px;margin:12px 0}
  .box h3{margin:0 0 4px;font-size:17px}
  .tag{font-size:12px;color:#8be}
  input{width:100%;box-sizing:border-box;padding:12px;font-size:16px;border-radius:8px;border:1px solid #333;background:#000;color:#fff;margin:8px 0}
  button{display:block;width:100%;padding:15px;margin:8px 0;font-size:17px;border:none;border-radius:10px;font-weight:bold;color:#fff}
  .cbtn{background:#2b7}.cbtn:active{background:#195}
  .tbtn{background:#57c}.tbtn:active{background:#349}
  .sbtn{background:#666}.sbtn:active{background:#444}
  #log{background:#000;border:1px solid #333;border-radius:8px;padding:8px;margin-top:10px;font-family:monospace;font-size:12px;white-space:pre-wrap;min-height:40px}
  .ok{color:#4d8}.err{color:#f66}.warn{color:#fd6}
</style>
</head>
<body>
<h2>🎤 两种唱法对比</h2>
<input id="lyric" value="今天天气真好" maxlength="20">
<p style="font-size:13px;color:#9aa">改上面歌词, 分别点两个方案听. <b>手机音量调大.</b></p>

<div class="box">
  <h3>🅰️ 方案 C：采样元音变调</h3>
  <div class="tag">纯前端·瞬发·免费. 用元音波形按音高唱, 音色比纯振荡器像人</div>
  <button class="cbtn" id="cbtn">▶ 用 C 唱一遍</button>
</div>

<div class="box">
  <h3>🅱️ 方案 TTS：系统语音念唱</h3>
  <div class="tag">调手机自带语音引擎念歌词, 边念边变速. 安卓常静默失败</div>
  <button class="tbtn" id="tbtn">▶ 用 TTS 唱一遍</button>
</div>

<div class="box" style="border-color:#a86">
  <h3>🇨️ 方案 C+TTS：合体唱</h3>
  <div class="tag">C 元音哼旋律当伴唱 + TTS 念歌词当咬字, 两个同时跑</div>
  <button style="background:#c84;display:block;width:100%;padding:15px;margin:8px 0;font-size:17px;border:none;border-radius:10px;font-weight:bold;color:#fff" id="ctbtn">▶ 用 C+TTS 合体唱</button>
</div>

<button class="sbtn" id="stop">⏹ 停止</button>
<div id="log">点按钮后这里显示状态…</div>

<script>
var logEl=document.getElementById('log');
function log(m,c){ logEl.innerHTML+='\n'+(c?'<span class="'+c+'">'+m+'</span>':m); }
function clr(){ logEl.innerHTML=''; }
var actx=null, curOscs=[];
function getCtx(){ if(!actx){var C=window.AudioContext||window.webkitAudioContext; actx=new C();} try{actx.resume&&actx.resume();}catch(e){} return actx; }
function stopAll(){ curOscs.forEach(function(o){try{o.stop();}catch(e){}}); curOscs=[]; try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){} }

var VOWELS={a:[730,1090,2440],o:[570,840,2410],e:[530,1840,2480],i:[270,2290,3010],u:[300,870,2240]};
var VK=['a','o','e','i','u'];
function charVowel(ch){var s=0;for(var i=0;i<ch.length;i++)s+=ch.charCodeAt(i);return VK[s%5];}
// 简单五声音阶 motif
var MOTIF=[0,2,4,7,9,7,4,2], SCALE=[0,2,4,7,9];
function NOTE(semi){return 261.63*Math.pow(2,semi/12);}

// ===== 方案 C: 采样元音(加法合成一个丰富元音, 比生产版共振峰更饱满) =====
function singC_one(ctx,dest,freq,t,dur,vowel){
  var F=VOWELS[vowel]||VOWELS.a;
  var env=ctx.createGain();
  env.gain.setValueAtTime(0.0001,t);
  env.gain.linearRampToValueAtTime(0.7,t+0.06);
  env.gain.setValueAtTime(0.7,t+dur*0.6);
  env.gain.linearRampToValueAtTime(0.5,t+dur*0.9);
  env.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.03);
  env.connect(dest);
  // 加法合成: 谐波按共振峰高斯加权(音色比 3 个 bandpass 更平滑饱满)
  var nH=Math.min(20,Math.floor(3800/freq));
  for(var n=1;n<=nH;n++){
    var hz=freq*n; if(hz>4200)break;
    var w=0.04;
    for(var k=0;k<3;k++){var bw=[120,140,190][k],a=[1,0.6,0.38][k];w=Math.max(w,a*Math.exp(-Math.pow((hz-F[k])/bw,2)));}
    if(w<0.045)continue;
    var o=ctx.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(hz*0.98,t);o.frequency.linearRampToValueAtTime(hz,t+0.03);
    var g=ctx.createGain();g.gain.value=w*(n===1?0.9:0.7)*0.42;
    o.connect(g).connect(env);o.start(t);o.stop(t+dur+0.05);curOscs.push(o);
  }
  // 颤音
  var lfo=ctx.createOscillator();lfo.frequency.value=5.2;
  var lg=ctx.createGain();lg.gain.setValueAtTime(0,t);lg.gain.setValueAtTime(0,t+Math.min(0.12,dur*0.4));lg.gain.linearRampToValueAtTime(freq*0.005,t+dur);
  lfo.start(t);lfo.stop(t+dur+0.05);curOscs.push(lfo);
}
function singCMelody(ctx,master,lyr){
  var t0=ctx.currentTime+0.08, step=0.42;
  lyr.forEach(function(ch,i){
    var semi=MOTIF[i%MOTIF.length];
    singC_one(ctx,master,NOTE(semi),t0+i*step,step*1.05,charVowel(ch));
  });
  return lyr.length*step;
}
function speakTTS(lyr,rate,pitch){
  if(!window.speechSynthesis||!window.SpeechSynthesisUtterance){log('❌ 不支持 TTS','err');return false;}
  var vs=speechSynthesis.getVoices();
  var zh=vs.filter(function(v){return /zh|cn|chinese|中文|普通/i.test(v.lang+v.name);});
  log('系统语音数='+vs.length+' 中文语音数='+zh.length, zh.length?'ok':'warn');
  var u=new SpeechSynthesisUtterance(lyr);
  if(zh.length)u.voice=zh[0];
  u.lang='zh-CN'; u.rate=rate; u.pitch=pitch;
  u.onstart=function(){log('▶ TTS 开始念','ok');};
  u.onend=function(){log('✅ TTS 念完','ok');};
  u.onerror=function(e){log('❌ TTS: '+e.error,'err');};
  speechSynthesis.speak(u); return true;
}
document.getElementById('cbtn').onclick=function(){
  clr(); stopAll(); log('🅰️ 方案C 采样元音唱…');
  try{
    var ctx=getCtx(); log('ctx.state='+ctx.state,ctx.state==='running'?'ok':'warn');
    var lyr=document.getElementById('lyric').value.replace(/\s/g,'').split('').slice(0,20);
    if(!lyr.length){log('歌词空','err');return;}
    var master=ctx.createGain();master.gain.value=1.15;master.connect(ctx.destination);
    var t0=ctx.currentTime+0.08, step=0.42;
    lyr.forEach(function(ch,i){
      var deg=SCALE[MOTIF[i%MOTIF.length]%SCALE.length];
      var semi=MOTIF[i%MOTIF.length];
      singC_one(ctx,master,NOTE(semi),t0+i*step,step*1.05,charVowel(ch));
    });
    log('✅ '+lyr.length+' 字, 唱 '+(lyr.length*step).toFixed(1)+'s. 听感如何?','ok');
  }catch(e){log('❌ '+e.message,'err');}
};

// ===== 方案 TTS: 系统语音念唱 =====
document.getElementById('tbtn').onclick=function(){
  clr(); stopAll(); log('🅱️ 方案TTS 系统语音…');
  try{
    if(!window.speechSynthesis||!window.SpeechSynthesisUtterance){log('❌ 此浏览器不支持 TTS','err');return;}
    var lyr=document.getElementById('lyric').value.replace(/\s/g,'');
    if(!lyr){log('歌词空','err');return;}
    var vs=speechSynthesis.getVoices();
    var zh=vs.filter(function(v){return /zh|cn|chinese|中文|普通/i.test(v.lang+v.name);});
    log('系统语音数='+vs.length+' 中文语音数='+zh.length, zh.length?'ok':'warn');
    var u=new SpeechSynthesisUtterance(lyr);
    if(zh.length)u.voice=zh[0];
    u.lang='zh-CN'; u.rate=0.55; u.pitch=1.4;   // 慢+高音模拟"唱"
    u.onstart=function(){log('▶ TTS 开始念(rate0.55 pitch1.4)','ok');};
    u.onend=function(){log('✅ TTS 念完. 像唱歌吗?','ok');};
    u.onerror=function(e){log('❌ TTS 报错: '+e.error,'err');};
    speechSynthesis.speak(u);
    setTimeout(function(){log('(若无声: state='+(speechSynthesis.speaking?'speaking':(speechSynthesis.pending?'pending':'idle'))+')',speechSynthesis.speaking?'ok':'err');},600);
  }catch(e){log('❌ '+e.message,'err');}
};

document.getElementById('ctbtn').onclick=function(){
  clr(); stopAll(); log('🇨 C+TTS 合体唱…');
  try{
    var ctx=getCtx(); log('ctx.state='+ctx.state,ctx.state==='running'?'ok':'warn');
    var lyr=document.getElementById('lyric').value.replace(/\s/g,'').split('').slice(0,20);
    if(!lyr.length){log('歌词空','err');return;}
    var master=ctx.createGain();master.gain.value=0.9;master.connect(ctx.destination);
    var dur=singCMelody(ctx,master,lyr);         // C 元音哼旋律
    speakTTS(lyr.join(''),0.6,1.3);              // TTS 同步念歌词(必须在手势内)
    log('✅ C伴唱+TTS咬字 同时跑. 合体好听吗?','ok');
  }catch(e){log('❌ '+e.message,'err');}
};
document.getElementById('stop').onclick=function(){stopAll();clr();log('已停止');};
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=function(){};speechSynthesis.getVoices();}
</script>
</body>
</html>
