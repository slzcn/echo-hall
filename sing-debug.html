<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>神曲人声诊断</title>
<style>
  body{margin:0;padding:16px;font-family:-apple-system,sans-serif;background:#111;color:#eee;font-size:16px;line-height:1.7}
  h2{font-size:18px;margin:12px 0 6px}
  button{display:block;width:100%;padding:16px;margin:10px 0;font-size:17px;border:none;border-radius:10px;background:#2b7;color:#fff;font-weight:bold}
  button:active{background:#195}
  #log{background:#000;border:1px solid #333;border-radius:8px;padding:10px;margin-top:12px;white-space:pre-wrap;font-family:monospace;font-size:12px;min-height:120px;max-height:300px;overflow:auto}
  .ok{color:#4d8}.err{color:#f66}.warn{color:#fd6}.info{color:#8be}
</style>
</head>
<body>
<h2>🔬 神曲人声诊断（安卓专用）</h2>
<p>依次点每个按钮，把每次结果告诉小龙虾。<b>音量调大，耐心听 1~2 秒</b>。</p>

<button id="b1">① 立即播放（t=now+0.02，简单包络）</button>
<button id="b2">② 未来播放（t=now+0.18，跟神曲一样时机）</button>
<button id="b3">③ 加 BiquadFilter 共振峰（跟神曲主唱同链）</button>
<button id="b4">④ 完整 singVoice（跟当前生产版 100% 一样）</button>
<button id="b5">⑤ 6 个音符连唱（跟真实神曲一样）</button>

<div id="log">点按钮后这里显示结果…</div>

<script>
var logEl=document.getElementById('log');
function log(msg,cls){ logEl.innerHTML += '\n'+(cls?'<span class="'+cls+'">'+msg+'</span>':msg); logEl.scrollTop=logEl.scrollHeight; }
function clr(){ logEl.innerHTML=''; }
var actx=null;
function getCtx(){
  if(!actx){ var C=window.AudioContext||window.webkitAudioContext; actx=new C(); }
  try{ actx.resume&&actx.resume(); }catch(e){}
  return actx;
}
function reportCtx(ctx){
  log('AudioContext.state='+ctx.state, ctx.state==='running'?'ok':'warn');
  log('currentTime='+ctx.currentTime.toFixed(3)+'s | sampleRate='+ctx.sampleRate);
}

// ① 立即包络: t=now+0.02
document.getElementById('b1').onclick=function(){
  clr(); log('① 立即播包络人声(t=now+0.02)…','info');
  try{
    var ctx=getCtx(); reportCtx(ctx);
    var t=ctx.currentTime+0.02, dur=0.8;
    var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=330;
    var env=ctx.createGain();
    env.gain.setValueAtTime(0.0001,t);
    env.gain.linearRampToValueAtTime(0.5,t+0.05);
    env.gain.setValueAtTime(0.5,t+dur*0.6);
    env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(env).connect(ctx.destination);
    o.start(t); o.stop(t+dur+0.05);
    log('✅ 排定. 你应听到 0.8s 的锯齿音. 听到了吗？','ok');
  }catch(e){ log('❌ '+e.message,'err'); }
};

// ② 未来包络: t=now+0.18 (跟神曲 t0 一样)
document.getElementById('b2').onclick=function(){
  clr(); log('② 未来播包络(t=now+0.18, 跟神曲一样)…','info');
  try{
    var ctx=getCtx(); reportCtx(ctx);
    var t=ctx.currentTime+0.18, dur=0.8;
    var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=330;
    var env=ctx.createGain();
    env.gain.setValueAtTime(0.0001,t);
    env.gain.linearRampToValueAtTime(0.5,t+0.05);
    env.gain.setValueAtTime(0.5,t+dur*0.6);
    env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(env).connect(ctx.destination);
    o.start(t); o.stop(t+dur+0.05);
    log('✅ 排定. 应 180ms 后开始出声. 听到了吗？','ok');
    log('若①有②没 → t 未来时机在安卓有问题','warn');
  }catch(e){ log('❌ '+e.message,'err'); }
};

// ③ 加 BiquadFilter 共振峰
document.getElementById('b3').onclick=function(){
  clr(); log('③ 未来播 + 3 个 BiquadFilter 共振峰(跟神曲主唱同链)…','info');
  try{
    var ctx=getCtx(); reportCtx(ctx);
    var t=ctx.currentTime+0.18, dur=0.8;
    var src=ctx.createOscillator(); src.type='sawtooth'; src.frequency.value=330;
    var env=ctx.createGain();
    env.gain.setValueAtTime(0.0001,t);
    env.gain.linearRampToValueAtTime(0.5,t+0.05);
    env.gain.setValueAtTime(0.5,t+dur*0.6);
    env.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    var F=[730,1090,2440], fg=[1.0,0.6,0.35];
    F.forEach(function(f,i){
      var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=i===0?4:6;
      var g=ctx.createGain(); g.gain.value=fg[i];
      src.connect(bp).connect(g).connect(env);
    });
    env.connect(ctx.destination);
    src.start(t); src.stop(t+dur+0.05);
    log('✅ 排定. 应听到"啊"的音色. 听到了吗？','ok');
    log('若②有③没 → 3 个 BiquadFilter 并联在安卓有 bug','warn');
  }catch(e){ log('❌ '+e.message,'err'); }
};

// ④ 完整 singVoice
document.getElementById('b4').onclick=function(){
  clr(); log('④ 完整 singVoice(跟生产版 100%一样)…','info');
  try{
    var ctx=getCtx(); reportCtx(ctx);
    // 复刻生产版 singVoice
    var VOWELS={a:[730,1090,2440]};
    function singVoice(ctx,dest,freq,t,dur,vowel,gain,wave){
      var gliss=Math.min(0.035,dur*0.18);
      var src=ctx.createOscillator(); src.type=wave||'sawtooth';
      src.frequency.setValueAtTime(freq*0.97,t); src.frequency.linearRampToValueAtTime(freq,t+gliss);
      var lfo=ctx.createOscillator(); lfo.frequency.value=5.5;
      var lfoG=ctx.createGain();
      lfoG.gain.setValueAtTime(0.0001,t);
      lfoG.gain.setValueAtTime(0.0001,t+Math.min(0.12,dur*0.4));
      lfoG.gain.linearRampToValueAtTime(freq*0.006,t+dur);
      lfo.connect(lfoG).connect(src.frequency);
      var env=ctx.createGain();
      env.gain.setValueAtTime(0.0001,t);
      env.gain.linearRampToValueAtTime(gain,t+0.05);
      env.gain.setValueAtTime(gain,t+dur*0.55);
      env.gain.linearRampToValueAtTime(gain*0.7,t+dur*0.9);
      env.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.02);
      var F=VOWELS[vowel], fg=[1.0,0.6,0.35];
      F.forEach(function(f,i){
        var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=i===0?4:6;
        var g=ctx.createGain(); g.gain.value=fg[i]; src.connect(bp).connect(g).connect(env);
      });
      env.connect(dest);
      src.start(t); src.stop(t+dur+0.06); lfo.start(t); lfo.stop(t+dur+0.06);
      var chest=ctx.createOscillator(); chest.type='sine';
      chest.frequency.setValueAtTime(freq*0.97,t); chest.frequency.linearRampToValueAtTime(freq,t+gliss);
      var cg=ctx.createGain();
      cg.gain.setValueAtTime(0.0001,t);
      cg.gain.linearRampToValueAtTime(gain*0.5,t+0.05);
      cg.gain.setValueAtTime(gain*0.5,t+dur*0.6);
      cg.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.02);
      chest.connect(cg).connect(dest); chest.start(t); chest.stop(t+dur+0.06);
    }
    var master=ctx.createGain(); master.gain.value=0.75; master.connect(ctx.destination);
    var voiceBus=ctx.createGain(); voiceBus.gain.value=1.15; voiceBus.connect(master);
    var t=ctx.currentTime+0.18;
    singVoice(ctx,voiceBus,330,t,1.0,'a',0.7,'sawtooth');
    log('✅ 排定. 应听到完整"啊~". 听到了吗？','ok');
    log('若③有④没 → 生产版 singVoice 特定组合在安卓有 bug','warn');
  }catch(e){ log('❌ '+e.message,'err'); }
};

// ⑤ 6 个音符连唱
document.getElementById('b5').onclick=function(){
  clr(); log('⑤ 6 个音符连唱(跟真实神曲一样)…','info');
  try{
    var ctx=getCtx(); reportCtx(ctx);
    var VOWELS={a:[730,1090,2440],o:[570,840,2410],e:[530,1840,2480],i:[270,2290,3010],u:[300,870,2240]};
    function singVoice(ctx,dest,freq,t,dur,vowel,gain,wave){
      var gliss=Math.min(0.035,dur*0.18);
      var src=ctx.createOscillator(); src.type=wave||'sawtooth';
      src.frequency.setValueAtTime(freq*0.97,t); src.frequency.linearRampToValueAtTime(freq,t+gliss);
      var env=ctx.createGain();
      env.gain.setValueAtTime(0.0001,t);
      env.gain.linearRampToValueAtTime(gain,t+0.05);
      env.gain.setValueAtTime(gain,t+dur*0.55);
      env.gain.linearRampToValueAtTime(gain*0.7,t+dur*0.9);
      env.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.02);
      var F=VOWELS[vowel]||VOWELS.a, fg=[1.0,0.6,0.35];
      F.forEach(function(f,i){
        var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=i===0?4:6;
        var g=ctx.createGain(); g.gain.value=fg[i]; src.connect(bp).connect(g).connect(env);
      });
      env.connect(dest);
      src.start(t); src.stop(t+dur+0.06);
    }
    var master=ctx.createGain(); master.gain.value=0.75; master.connect(ctx.destination);
    var voiceBus=ctx.createGain(); voiceBus.gain.value=1.15; voiceBus.connect(master);
    var chars=['a','o','e','i','a','o'], freqs=[262,294,330,349,392,440];
    var t0=ctx.currentTime+0.18, step=0.4;
    for(var i=0;i<6;i++){
      singVoice(ctx,voiceBus,freqs[i],t0+i*step,step*1.05,chars[i],0.7,'sawtooth');
    }
    log('✅ 排定 6 音符, 应听到"啊哦额伊啊哦"连唱 2.4s. 听到了吗？','ok');
  }catch(e){ log('❌ '+e.message,'err'); }
};
</script>
</body>
</html>
