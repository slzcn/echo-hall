name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/bug-check-ypox4r]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Pages 已由首次运行的 configure-pages(enablement) 自动开启，此后 deploy-pages
    # 要求声明 github-pages environment 才能部署
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html admin.html README.md _site/
          cp -R masters _site/masters
      # enablement:true 让 configure-pages 首次运行时自动开启 Pages(build type=Actions)，
      # 不声明 environment，避免在 Pages 尚未启用时 job 无法调度
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
