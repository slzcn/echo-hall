<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#070a12"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5D4"/>
      <stop offset="100%" stop-color="#34E0B0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角底 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 回声同心波纹 -->
  <g filter="url(#glow)" fill="none" stroke="url(#wave)" stroke-linecap="round">
    <circle cx="256" cy="256" r="46" stroke="#00E5D4" stroke-width="0" fill="#00E5D4"/>
    <circle cx="256" cy="256" r="92" stroke-width="14" opacity="0.92"/>
    <circle cx="256" cy="256" r="140" stroke-width="12" opacity="0.62" stroke-dasharray="330 120" transform="rotate(-30 256 256)"/>
    <circle cx="256" cy="256" r="188" stroke-width="10" opacity="0.34" stroke-dasharray="420 240" transform="rotate(60 256 256)"/>
  </g>
</svg>
